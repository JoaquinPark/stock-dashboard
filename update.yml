name: 주가 데이터 자동 업데이트

on:
  schedule:
    # 매일 오전 6시 KST (= UTC 21:00 전날)
    - cron: "0 21 * * 1-5"   # 평일(월~금)만 실행
  workflow_dispatch:           # 수동 실행 버튼도 활성화

jobs:
  update-stock-data:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 주가 데이터 수집
        run: python fetch_stocks.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock-data.json
          git diff --cached --quiet || git commit -m "📈 주가 데이터 업데이트 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push
