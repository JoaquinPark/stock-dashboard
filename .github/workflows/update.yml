const GRP_NAME = { hyundai:'현대자동차그룹', samsung:'삼성그룹', sk:'SK그룹' };
let stockData = {};

// ── 시총 포맷 ──
// 개별 종목: 한자리(0~9조)는 소수점 1자리, 그 외는 정수, 1000조 이상도 O,OOO조
// 그룹 합계: 항상 O,OOO조 (쉼표 구분)
function fmtMcap(t, forceComma) {
  if (!t) return '—';
  if (forceComma || t >= 1000) {
    // 1,279조 형태
    return Math.round(t).toLocaleString('ko-KR') + '조';
  }
  if (t < 10) return t.toFixed(1) + '조';   // 한 자리: 소수점 1자리
  return Math.floor(t) + '조';
}

// ── 데이터 로딩: stock-data.json → 없으면 SEED 폴백 ──
async function loadAll() {
  document.getElementById('refreshBtn').classList.add('loading');
  showSkeletons();

  let jsonData = null;
  try {
    // GitHub Pages에서 같은 경로의 stock-data.json을 fetch
    const res = await fetch('stock-data.json?t=' + Date.now(), { cache: 'no-store' });
    if (res.ok) jsonData = await res.json();
  } catch (e) {
    console.warn('stock-data.json 로드 실패, 시드 데이터 사용:', e);
  }

  const all = [...STOCKS.hyundai, ...STOCKS.samsung, ...STOCKS.sk];
  all.forEach(s => {
    const live = jsonData?.stocks?.[s.code];
    const seed = SEED[s.code] || {};
    stockData[s.code] = {
      name:      s.name,
      price:     live?.price     ?? seed.p   ?? 0,
      marketCap: live?.marketCap ?? seed.mc  ?? null,
      h52:       live?.h52       ?? seed.h52 ?? null,
      l52:       live?.l52       ?? seed.l52 ?? null,
      per:       live?.per       ?? seed.per ?? null,
      pbr:       live?.pbr       ?? seed.pbr ?? null,
    };
  });

  // 날짜 레이블 업데이트
  const dateLabel = jsonData?.date_label ?? '—';
  const el = document.getElementById('dataDateLabel');
  if (el) el.textContent = dateLabel + ' ';

  renderAll();
  updateMcap();
  document.getElementById('refreshBtn').classList.remove('loading');
}

function updateMcap() {
  ['hyundai', 'samsung', 'sk'].forEach(g => {
    let sum = 0;
    STOCKS[g].forEach(s => { sum += stockData[s.code]?.marketCap || 0; });
    // 그룹 합계는 항상 쉼표 O,OOO조 형태
    document.getElementById(`mc-${g}`).textContent   = fmtMcap(sum, true);
    document.getElementById(`mc-${g}-n`).textContent = STOCKS[g].length + '개 종목';
  });
}

// ── 렌더링 ──
const fp  = n => (n != null ? n.toLocaleString('ko-KR') : '—');
const dir = c => c > 0 ? 'up' : c < 0 ? 'down' : 'flat';
const arw = c => (c > 0 ? '▲' : c < 0 ? '▼' : '') + Math.abs(c).toLocaleString();

const COL_HDR = `<div class="col-hdr">
  <span>종목</span>
  <span>시총</span>
  <span>전일 종가</span>
  <span>PER</span>
  <span>PBR</span>
</div>`;

function rowHTML(s) {
  const d = stockData[s.code]; if (!d) return '';
  const per = d.per != null ? d.per.toFixed(1) : '<span class="sna">—</span>';
  const pbr = d.pbr != null ? d.pbr.toFixed(2) : '<span class="sna">—</span>';
  const mc  = d.marketCap ? fmtMcap(d.marketCap) : '<span class="sna">—</span>';
  const l52txt = d.l52 != null
    ? `52주 최저 ${fp(d.l52)}<br>52주 최고 ${fp(d.h52)}`
    : '—';

  return `<div class="stock-row" onclick="openNaver('${s.code}')">
    <div>
      <div class="sname">${d.name}</div>
      <div class="scode">${s.code}</div>
    </div>
    <div class="c-mcap"><div class="smcap">${mc}</div></div>
    <div class="c-price">
      <div class="sprice">${fp(d.price)}</div>
      <div class="s52">${l52txt}</div>
    </div>
    <div class="c-per"><div class="sper">${per}</div></div>
    <div class="c-pbr"><div class="spbr">${pbr}</div></div>
  </div>`;
}

function tableHTML(g) {
  const stocks = [...STOCKS[g]].sort(
    (a, b) => (stockData[b.code]?.marketCap || 0) - (stockData[a.code]?.marketCap || 0)
  );
  const up = stocks.filter(s => (stockData[s.code]?.change || 0) > 0).length;
  const dn = stocks.filter(s => (stockData[s.code]?.change || 0) < 0).length;

  const grpClass = g === 'hyundai' ? 'hyundai' : g === 'samsung' ? 'samsung' : 'sk';

  return `<div class="list-hdr">
    <span class="list-hdr-name ${grpClass}">${GRP_NAME[g]} · ${stocks.length}종목</span>
  </div>
  <div class="stock-table">
    ${COL_HDR}
    ${stocks.map(rowHTML).join('')}
  </div>`;
}

function renderAll() {
  ['hyundai', 'samsung', 'sk'].forEach(g => {
    document.getElementById(`sec-${g}`).innerHTML = tableHTML(g);
  });
}

function showSkeletons() {
  const skelRow = () => `<div class="skel-row">
    <div>
      <div class="skeleton" style="width:76px;height:14px;margin-bottom:5px;"></div>
      <div class="skeleton" style="width:42px;height:10px;"></div>
    </div>
    <div style="text-align:right"><div class="skeleton" style="width:38px;height:12px;display:inline-block;"></div></div>
    <div style="text-align:right">
      <div class="skeleton" style="width:60px;height:15px;display:inline-block;margin-bottom:4px;"></div><br>
      <div class="skeleton" style="width:90px;height:9px;display:inline-block;"></div>
    </div>
    <div style="text-align:right"><div class="skeleton" style="width:26px;height:12px;display:inline-block;"></div></div>
    <div style="text-align:right"><div class="skeleton" style="width:26px;height:12px;display:inline-block;"></div></div>
  </div>`;
  const grpColor = { hyundai:'var(--hyundai)', samsung:'var(--samsung)', sk:'var(--sk)' };
  ['hyundai', 'samsung', 'sk'].forEach(g => {
    document.getElementById(`sec-${g}`).innerHTML =
      `<div class="list-hdr"><span class="list-hdr-name ${g}" style="color:${grpColor[g]}">${GRP_NAME[g]}</span></div>
       <div class="stock-table">${COL_HDR}${Array(5).fill(skelRow()).join('')}</div>`;
  });
}


function openNaver(code) {
  window.open(`https://m.stock.naver.com/domestic/stock/${code}/home`, '_blank');
}

setInterval(loadAll, 5 * 60 * 1000);
loadAll();
</script>
