name: 주가 데이터 자동 업데이트

on:
  schedule:
    # 매일 오전 6시 KST (= UTC 21:00 전날)
    - cron: "0 21 * * 1-5"   # 평일(월~금)만 실행
  workflow_dispatch:           # 수동 실행 버튼도 활성화

jobs:
  update-stock-data:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 주가 데이터 수집
        run: python fetch_stocks.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock-data.json
          git diff --cached --quiet || git commit -m "📈 주가 데이터 업데이트 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>현대차·삼성·SK 그룹 상장사 주가 현황</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root {
  --bg:      #f2f3f5;
  --white:   #ffffff;
  --text:    #111827;
  --text2:   #374151;
  --muted:   #9ca3af;
  --border:  #e5e7eb;
  --up:      #dc2626;
  --down:    #2563eb;
  --flat:    #6b7280;
  --hyundai: #002c5f;
  --samsung: #1428a0;
  --sk:      #ea0029;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 14px; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 10px;
  padding-top: calc(14px + env(safe-area-inset-top, 0px));
  position: sticky; top: 0; z-index: 200;
}
.header-row1 {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.header-title { font-size: 14px; font-weight: 800; letter-spacing: -0.4px; }

.refresh-btn {
  background: var(--bg); border: 1px solid var(--border); color: var(--text2);
  padding: 7px 13px; border-radius: 8px; font-family: inherit;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 5px; min-height: 36px;
}
.refresh-btn:active { background: var(--text); color: #fff; border-color: var(--text); }
.refresh-btn.loading { opacity: 0.45; pointer-events: none; }
.refresh-btn.loading svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.source-row {
  display: flex; align-items: center; gap: 5px; flex-wrap: nowrap;
  overflow-x: auto; scrollbar-width: none;
}
.source-row::-webkit-scrollbar { display: none; }

.badge {
  display: inline-flex; align-items: center; gap: 3px;
  border-radius: 99px; padding: 3px 9px;
  font-size: 11px; font-weight: 500; white-space: nowrap; flex-shrink: 0;
}
.badge-blue { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }
.badge-green { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
.badge-gray  { background: #f9fafb; border: 1px solid #d1d5db; color: var(--text2); }
.update-time { font-size: 11px; color: var(--muted); margin-left: auto; flex-shrink: 0; white-space: nowrap; }

/* ── 그룹 요약 카드 (클릭 없는 정보 전달용) ── */
.tabs-wrap { padding: 12px 12px 0; }
.tabs { display: flex; gap: 8px; }

.tab {
  flex: 1;
  padding: 12px 8px 11px;
  border-radius: 12px;
  text-align: center;
  border: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer;
}
.tab[data-g="hyundai"] { background: var(--hyundai); color: #fff; box-shadow: 0 3px 12px rgba(0,44,95,0.28); }
.tab[data-g="samsung"]  { background: var(--samsung); color: #fff; box-shadow: 0 3px 12px rgba(20,40,160,0.28); }
.tab[data-g="sk"]       { background: var(--sk);      color: #fff; box-shadow: 0 3px 12px rgba(234,0,41,0.25); }

.tab-name  { display: block; font-size: 14px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 5px; line-height: 1.2; color: rgba(255,255,255,0.9); }
.tab-bottom { display: flex; align-items: baseline; justify-content: center; gap: 5px; }
.tab-mcap-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.65); margin-right: 2px; }
.tab-mcap  { font-size: 12px; font-weight: 700; letter-spacing: -0.3px; line-height: 1; color: rgba(255,255,255,0.85); }
.tab-count { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.65); }

/* ── STOCKS ── */
.stocks-wrap { padding: 10px 12px calc(24px + env(safe-area-inset-bottom, 0px)); }

/* 안내 노트 */
.data-note {
  margin: 0 0 10px;
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 10px 13px;
  font-size: 10.5px;
  color: #9ca3af;       /* 연한 회색 */
  line-height: 1.7;
}
.data-note strong { font-weight: 600; color: #b0b7c3; }
.data-note .formula {
  display: inline;
  background: #f0f2f5;
  border-radius: 4px;
  padding: 0 5px;
  font-size: 10px;
  color: #b0b7c3;
}

/* ── GROUP SECTION ── */
.group-section { display: block; }
.group-section + .group-section { margin-top: 6px; }

.list-hdr {
  display: flex; align-items: center;
  padding: 12px 2px 6px;
}
.list-hdr-name {
  font-size: 12px; font-weight: 800; letter-spacing: 0.03em;
  text-transform: uppercase;
}
.list-hdr-name.hyundai { color: var(--hyundai); }
.list-hdr-name.samsung  { color: var(--samsung); }
.list-hdr-name.sk       { color: var(--sk); }

/* ── TABLE ── */
.stock-table {
  background: var(--white);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}

/* 5컬럼: 종목 | 시총 | 주가 | PER | PBR */
.col-hdr,
.stock-row,
.skel-row {
  display: grid;
  grid-template-columns: 1fr 58px 100px 40px 40px;
  padding-left: 14px;
  padding-right: 12px;
}

.col-hdr {
  padding-top: 8px; padding-bottom: 8px;
  background: #f8f9fa;
  border-bottom: 1px solid var(--border);
  font-size: 10px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em;
  align-items: center;
}
.col-hdr > span { padding: 0 2px; }
.col-hdr > span:not(:first-child) { text-align: right; }

.stock-row {
  padding-top: 8px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s;
  align-items: center;
}
.stock-row:last-child { border-bottom: none; }
.stock-row:hover  { background: #f9fafb; }
.stock-row:active { background: #f0f2f5; }
.stock-row > div  { padding: 0 2px; }

/* 종목 셀 */
.sname { font-size: 13.5px; font-weight: 700; color: var(--text); line-height: 1.25; }
.scode { font-size: 10px; color: var(--muted); font-weight: 400; margin-top: 2px; }

/* 시총 */
.c-mcap { text-align: right; }
.smcap  { font-size: 11.5px; font-weight: 500; color: var(--text2); padding-top: 1px; line-height: 1.3; }

/* 주가 + 52주 */
.c-price { text-align: right; }
.sprice  { font-size: 14px; font-weight: 800; line-height: 1.2; letter-spacing: -0.3px; color: var(--text); }
.s52 { font-size: 9.5px; color: var(--muted); font-weight: 400; line-height: 1.55; margin-top: 2px; }


/* PER / PBR */
.c-per, .c-pbr { text-align: right; }
.sper, .spbr   { font-size: 11px; font-weight: 500; color: var(--text2); line-height: 1.4; }
.sna { color: var(--muted); font-size: 10px; font-weight: 400; }

/* SKELETON */
.skeleton {
  background: linear-gradient(90deg,#eff0f2 25%,#e4e5e8 50%,#eff0f2 75%);
  background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 4px;
  display: inline-block;
}
@keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

.skel-row {
  padding-top: 11px; padding-bottom: 11px;
  border-bottom: 1px solid var(--border); align-items: center;
}
.skel-row:last-child { border-bottom: none; }
</style>
</head>
